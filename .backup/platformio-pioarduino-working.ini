[platformio]

# Include task configurations that extend halmet
extra_configs = 
	; lib/halmet*/platformio.ini
    lib/halmetPluginNavlinkBLETask/platformio.ini

build_cache_dir= ./.pio/build_cache/halmet

default_envs = halmet

[env:halmet]
platform = https://github.com/pioarduino/platform-espressif32.git
framework = arduino
board = esp32dev

; build_src_filter = 
;     +<*>
;     +</lib/halmettask/ESPmDNS.h>

; lib_extra_dirs = 
;     lib/halmettask

lib_deps = 
    Networking ; maybe needed for networkinferface.h
    ${basedeps.lib_deps}
    ; Fix incompatibility with older web libs and pioarduino
    esp32async/AsyncTCP @ ^3.4.10
	esp32async/ESPAsyncWebServer @ ^3.9.6
    ${navlinkble.lib_deps}
lib_ignore = 
    ; FastLED
    ; ledtask
    ; buttontask
    ESPAsyncTCP-esphome
    AsyncTCP-esphome
    ESPAsyncWebServer-esphome
    BLE
    BluetoothSerial
    RainMaker
    ; ESPmDNS

custom_config=
    lib/halmettask/halmetConfig.json

custom_component_remove =
    ; Remove components that are not needed. Prevents https certificate error
    espressif/cbor
    espressif/esp-dsp
    espressif/esp-modbus
    espressif/esp-serial-flasher
    espressif/esp-zboss-lib
    espressif/esp-zigbee-lib
    espressif/esp_diag_data_store
    espressif/esp_diagnostics
    espressif/esp_insights
    espressif/esp_modem
    espressif/esp_rainmaker
    espressif/esp_rcp_update
    espressif/esp_schedule
    espressif/esp_secure_cert_mgr
    espressif/cmake_utilities
    espressif/fb_gfx
    espressif/jsmn
    espressif/json_generator
    espressif/json_parser
    espressif/lan867x
    espressif/lan86xx_common
    espressif/libsodium
    chmorgan/esp-libhelix-mp3
    espressif/fb_gfx
    espressif/network_provisioning
    espressif/qrcode
    espressif/rmaker_common
    joltwallet/littlefs
    ; espressif/mdns


custom_sdkconfig =
    ; Heap optimization settings
    
    ; Task stack sizes - reduced for memory savings
    ; CONFIG_ESP_TIMER_TASK_STACK_SIZE=3072
    ; CONFIG_ARDUINO_LOOP_STACK_SIZE=4096
    
    ; LWIP Network Stack - optimized for web server
    ; CONFIG_LWIP_MAX_SOCKETS=10
    ; CONFIG_LWIP_TCP_SND_BUF_DEFAULT=2920
    ; CONFIG_LWIP_TCP_WND_DEFAULT=2920
    ; CONFIG_LWIP_TCPIP_RECVMBOX_SIZE=16
    ; CONFIG_LWIP_MAX_ACTIVE_TCP=8
    ; CONFIG_LWIP_MAX_LISTENING_TCP=4
    
    ; WiFi buffers - reduced
    ; CONFIG_ESP_WIFI_DYNAMIC_RX_BUFFER_NUM=20
    ; CONFIG_ESP_WIFI_DYNAMIC_TX_BUFFER_NUM=20
    
    ; MDNS - reduce heap usage
    CONFIG_MDNS_MAX_SERVICES=2
    ; CONFIG_MDNS_TASK_STACK_SIZE=2048
    ; CONFIG_MDNS_ACTION_QUEUE_LEN=4
    
    ; Disable Bluetooth to save ~50KB+ heap
    ; CONFIG_BT_ENABLED=n
    
    ; HTTP Server - optimized
    ; CONFIG_HTTPD_MAX_REQ_HDR_LEN=512
    ; CONFIG_HTTPD_MAX_URI_LEN=256
    
    ; mbedTLS - reduced buffer size
    ; CONFIG_MBEDTLS_SSL_MAX_CONTENT_LEN=8192
    
    ; Disable runtime stats and profiling
    CONFIG_FREERTOS_USE_STATS_FORMATTING_FUNCTIONS=n
    CONFIG_FREERTOS_GENERATE_RUN_TIME_STATS=n
    
    ; Disable BLE Mesh
    CONFIG_BLE_MESH=n
    
    ; Disable unused protocols
    CONFIG_LWIP_PPP_SUPPORT=n
    CONFIG_LWIP_IPV6=n
    
    ; Disable Zigbee, Matter, Thread, and other unused stacks
    CONFIG_OPENTHREAD_ENABLED=n
    CONFIG_IEEE802154_ENABLED=n
    CONFIG_ZB_ENABLED=n
    
    ; Disable RainMaker and diagnostics
    CONFIG_ESP_RMAKER_WORK_QUEUE_TASK_STACK=n
    
    ; Disable USB-OTG/TinyUSB (not needed for ESP32 classic)
    CONFIG_TINYUSB_ENABLED=n
    
    ; Disable Touch Sensor
    CONFIG_TOUCH_SUPPRESS_DEPRECATE_WARN=y
    
    ; Disable DAC (if not using analog output)
    CONFIG_DAC_SUPPRESS_DEPRECATE_WARN=y
    
    ; Disable I2S (if not using audio)
    CONFIG_I2S_SUPPRESS_DEPRECATE_WARN=y

    ; Further optimizations
    CONFIG_NEWLIB_NANO_FORMAT=y
    CONFIG_FREERTOS_PLACE_FUNCTIONS_INTO_FLASH=y
    CONFIG_HEAP_PLACE_FUNCTION_INTO_FLASH=y
    
    ; Additional flash placement to save IRAM
    ; CONFIG_LWIP_IRAM_OPTIMIZATION=n
    CONFIG_LWIP_EXTRA_IRAM_OPTIMIZATION=y
    CONFIG_ESP_WIFI_IRAM_OPT=y
    CONFIG_ESP_WIFI_RX_IRAM_OPT=y
    CONFIG_SPI_FLASH_YIELD_DURING_ERASE=y
    CONFIG_ESP32_WIFI_IRAM_OPT=y
    CONFIG_LWIP_IRAM_OPTIMIZATION=y
    
    ; More task optimizations
    ; CONFIG_ESP_SYSTEM_EVENT_TASK_STACK_SIZE=2304
    ; CONFIG_ARDUINO_UDP_TASK_STACK_SIZE=3072
    ; CONFIG_LWIP_TCPIP_TASK_STACK_SIZE=3584
    
    ; Reduce LWIP memory pools
    ; CONFIG_LWIP_MAX_UDP_PCBS=8
    ; CONFIG_LWIP_MAX_RAW_PCBS=8
    ; CONFIG_LWIP_UDP_RECVMBOX_SIZE=4
    
    ; BLE optimization - enable only NimBLE (lighter than Bluedroid)
    CONFIG_BT_CLASSIC_ENABLED=n

    CONFIG_BT_ENABLED=y
    CONFIG_BTDM_CTRL_MODE_BLE_ONLY=y
    CONFIG_BTDM_CTRL_MODE_BR_EDR_ONLY=n
    CONFIG_BTDM_CTRL_MODE_BTDM=n
    CONFIG_BT_BLUEDROID_ENABLED=n
    CONFIG_BT_NIMBLE_ENABLED=y
    ; CONFIG_BT_ENABLED=y
    ; CONFIG_BT_NIMBLE_ENABLED=y
    ; CONFIG_BT_BLUEDROID_ENABLED=n
    ; CONFIG_BTDM_CTRL_MODE_BLE_ONLY=y
    ; CONFIG_BTDM_CTRL_BLE_MAX_CONN=1
    ; CONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
    ; CONFIG_BT_NIMBLE_ROLE_PERIPHERAL=y
    ; CONFIG_BT_NIMBLE_ROLE_CENTRAL=n
    CONFIG_BT_NIMBLE_ROLE_BROADCASTER=n
    CONFIG_BT_NIMBLE_ROLE_OBSERVER=n
    CONFIG_BT_NIMBLE_MEM_ALLOC_MODE_INTERNAL=y
    ; CONFIG_BT_NIMBLE_MSYS_1_BLOCK_COUNT=12
    ; CONFIG_BT_NIMBLE_MSYS_1_BLOCK_SIZE=128
    ; CONFIG_BT_NIMBLE_MSYS_2_BLOCK_COUNT=24
    ; CONFIG_BT_NIMBLE_MSYS_2_BLOCK_SIZE=320
    ; CONFIG_BT_NIMBLE_ACL_BUF_COUNT=10
    ; CONFIG_BT_NIMBLE_ACL_BUF_SIZE=255
    ; CONFIG_BT_NIMBLE_HCI_EVT_BUF_SIZE=70
    CONFIG_BT_NIMBLE_PINNED_TO_CORE_0=y
    ; CONFIG_BT_NIMBLE_TASK_STACK_SIZE=3584
    
    # Aggressive buffer reduction to minimize heap usage
    # MSYS buffers - reduce to absolute minimum
    ; CONFIG_BT_NIMBLE_MSYS_1_BLOCK_COUNT=4
    ; CONFIG_BT_NIMBLE_MSYS_1_BLOCK_SIZE=64
    ; CONFIG_BT_NIMBLE_MSYS_2_BLOCK_COUNT=6
    ; CONFIG_BT_NIMBLE_MSYS_2_BLOCK_SIZE=256
    
    # ACL buffers - critical for heap reduction
    ; CONFIG_BT_NIMBLE_ACL_BUF_COUNT=4
    ; CONFIG_BT_NIMBLE_ACL_BUF_SIZE=255
    ; CONFIG_BT_NIMBLE_HCI_EVT_BUF_SIZE=70
    ; CONFIG_BT_NIMBLE_HCI_EVT_HI_BUF_COUNT=8
    ; CONFIG_BT_NIMBLE_HCI_EVT_LO_BUF_COUNT=2
    
    # GATT limits
    ; CONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
    ; CONFIG_BT_NIMBLE_MAX_GATTS_SERVICES=1
    ; CONFIG_BT_NIMBLE_MAX_GATTS_CHRS=3
    ; CONFIG_BT_NIMBLE_ATT_PREFERRED_MTU=23
    ; CONFIG_BT_NIMBLE_SVC_GAP_DEVICE_NAME_MAX_LEN=16
    
    # L2CAP buffers
    ; CONFIG_BT_NIMBLE_L2CAP_COC_MAX_NUM=0

    # Reduce Stack Sizes
    ; CONFIG_BT_NIMBLE_HOST_TASK_STACK_SIZE=2560

    # Ensure only BLE is active
    ; CONFIG_BTDM_CTRL_MODE_BLE_ONLY=y

    ; Fixes?
    CONFIG_BT_NIMBLE_ENABLED=y
    CONFIG_NIMBLE_CPP_ENABLE_RETURN_CODE_TEXT=n
    CONFIG_BT_NIMBLE_DEBUG=n

    ; Further optimizations
    CONFIG_FREERTOS_PLACE_FUNCTIONS_INTO_FLASH=y
    CONFIG_RINGBUF_PLACE_FUNCTIONS_INTO_FLASH=y
    CONFIG_HEAP_PLACE_FUNCTION_INTO_FLASH=y 
    CONFIG_MBEDTLS_DYNAMIC_BUFFER=y
    CONFIG_MBEDTLS_SSL_MAX_CONTENT_LEN=4096


build_flags=
    -D BOARD_HALMET
    -D NAVLINK_BLE_ENABLED
    ${env.build_flags}

    ; Required for MDNS library support (one or both of these may be needed)
    -D CONFIG_ETH_ENABLED
    -D SOC_WIFI_SUPPORTED=1

    ; Custom halmet platform header for PIOArduino compatibility
    -include "lib/halmettask/halmet_platform.h"

    -fpermissive

    ; BLE fixes?
    -DCONFIG_BT_NIMBLE_ENABLED
    -DCONFIG_BT_NIMBLE_ROLE_PERIPHERAL

    ; Reduce debugging things
    -Os

    ; link time optimization
    ; -flto
 
    ; More Optimisation
    -DCONFIG_MBEDTLS_DYNAMIC_BUFFER=1
    -DCORE_DEBUG_LEVEL=0

build_unflags =
    ; Reduce debugging things
    -Og
    -O2

extra_scripts = 
    ${env.extra_scripts}
    pre:lib/halmettask/extra_script_halmet.py



; Navlink BLE subtask configuration
[navlinkble]
lib_deps =  
    ; h2zero/esp-nimble-cpp@^2.3.4
    h2zero/NimBLE-Arduino@2.3.3
    ; Using built-in ESP-IDF NimBLE (no external library needed)