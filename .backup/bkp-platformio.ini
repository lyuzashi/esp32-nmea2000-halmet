; upload_protocol = esptool    
[env:halmet]
; platform = espressif32 @ 6.12.0 ; This is too new and causes build errors
; board = esp32dev



; Switch to the community platform
platform = https://github.com/pioarduino/platform-espressif32.git
board = esp32dev
framework = arduino, espidf
board_build.partitions = partitions_custom.csv

; Library dependency finder settings
lib_ldf_mode = deep+
lib_compat_mode = strict


; ; Enable custom configuration of the pre-compiled libraries
; board_build.arduino.upstream_packages = yes

; ; This is where you reclaim your 70KB of heap
; build_flags = 
;     -DCONFIG_BT_CONTROLLER_MODE_BLE_ONLY=y
;     -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=1


; custom_component_remove = espressif/esp_insights, espressif/esp_rainmaker
; Use empty value to prevent automatic inclusion of managed components
board_build.cmake.extra_components = -espressif__esp_insights,-espressif__esp_rainmaker,-espressif__esp_diagnostics,-espressif__rmaker_common


custom_sdkconfig =
    CONFIG_BT_ENABLED=y
    CONFIG_BT_BLE_ENABLED=y
    CONFIG_BTDM_CTRL_MODE_BLE_ONLY=y
    CONFIG_BTDM_CTRL_MODE_BR_EDR_ONLY=n
    CONFIG_BTDM_CTRL_MODE_BTDM=n
    CONFIG_ESP_INSIGHTS_ENABLED=n
    CONFIG_ESP_RMAKER_NO_CLAIM=y


lib_deps = 
    ${env.lib_deps}
    ; h2zero/NimBLE-Arduino@^2.3.7
    ; Need esphome fork for beginChunkedResponse API
    ; Original me-no-dev version doesn't have this method
    ; esphome/ESPAsyncWebServer-esphome
    ; Sensor task lib_deps will be merged here automatically via extra_configs
    ; https://github.com/MartinVerges/VeDirectFrameHandler.git
    ; ArduinoOTA

; Ignore libraries not needed for halmet board
lib_ignore = 
    FastLED  ; Not needed for halmet board
    esp_insights
    esp_rainmaker
    ESP RainMaker
    RainMaker
    ; ESPAsyncWebServer

; Apply these flags when compiling libraries
; lib_build_flags = 
;     ; Fix FastLED compilation with newer compilers
;     -Wno-error=narrowing
;     ; fpermissive already removes const errors for AsyncWebParameter
;     -fpermissive
;     ; mbedtls compatibility may not be needed with original ESPAsyncWebServer
;     ; but keeping them just in case
;     -Dmbedtls_md5_starts_ret=mbedtls_md5_starts
;     -Dmbedtls_md5_update_ret=mbedtls_md5_update
;     -Dmbedtls_md5_finish_ret=mbedtls_md5_finish
;     -Dmbedtls_sha1_starts_ret=mbedtls_sha1_starts
;     -Dmbedtls_sha1_update_ret=mbedtls_sha1_update
;     -Dmbedtls_sha1_finish_ret=mbedtls_sha1_finish

; extra_scripts = 
    ; pre:lib/halmettask/exclude_tasks.py

; src_dir = halmetsrc

; lib_dir = nolibs

; build_src_filter = 
;     +<*>
;     -</src/main.cpp>


; lib_ignore = 
; 	boatData
;     xdrmappings
;     nmea0183ton2k
;     nmea2kto0183
;     buttontask
;     ledtask
;     loggertask
;     nmea2ktoais
;     halmettask
;     iictask
;     spitask
;     queue
;     sensors
;     serial

; Use halmettask directory as the source directory instead of src/
; src_dir = /lib/halmettask/src

; build_src_filter = 
;     +<*>
;     -</src/>

build_flags=
    -D BOARD_HALMET
    ; -D NAVLINK_BLE_ENABLED
    ; -D AM2320_ENABLED
    
    ; Fix const conversion errors in project code
    -fpermissive
    -Wno-error=narrowing
    
    ; Fix mbedtls API changes in ESP-IDF 5.x (needed by ESPAsyncWebServer-esphome)
    -Dmbedtls_md5_starts_ret=mbedtls_md5_starts
    -Dmbedtls_md5_update_ret=mbedtls_md5_update
    -Dmbedtls_md5_finish_ret=mbedtls_md5_finish
    -Dmbedtls_sha1_starts_ret=mbedtls_sha1_starts
    -Dmbedtls_sha1_update_ret=mbedtls_sha1_update
    -Dmbedtls_sha1_finish_ret=mbedtls_sha1_finish
    
    ; Fix for missing ESP-IDF includes
    -I$PROJECT_PACKAGES_DIR/framework-arduinoespressif32/tools/sdk/esp32/include/esp_common/include
    -I$PROJECT_PACKAGES_DIR/framework-arduinoespressif32/tools/sdk/esp32/include/app_update/include
    -I$PROJECT_PACKAGES_DIR/framework-arduinoespressif32/tools/sdk/esp32/include/efuse/include
    -I$PROJECT_PACKAGES_DIR/framework-arduinoespressif32/tools/sdk/esp32/include/efuse/esp32/include
    -I$PROJECT_PACKAGES_DIR/framework-arduinoespressif32/tools/sdk/esp32/include/esp_hw_support/include
    
    ; Force-include ESP-IDF headers needed by main.cpp
    ; -include "esp_ota_ops.h" ; This causes <command-line>: fatal error: esp_ota_ops.h: No such file or directory
    -include "esp_mac.h"
    
    ; Fix for Network.h missing in Arduino-ESP32 3.x
    ; Use absolute path for compatibility headers
    ; -I$PROJECT_DIR/lib/halmettask
    
    ; Fix for mbedtls API changes in ESP-IDF 5.x
    ; -Dmbedtls_md5_starts_ret=mbedtls_md5_starts
    ; -Dmbedtls_md5_update_ret=mbedtls_md5_update
    ; -Dmbedtls_md5_finish_ret=mbedtls_md5_finish
    -D CONFIG_ETH_ENABLED
    -D SOC_WIFI_SUPPORTED=1
    
    ; Disable AsyncTCP SSL to prevent certificate file embedding
    -D CONFIG_ASYNC_TCP_SSL_ENABLED=0
    
; Also add to CPPPATH for build system
; build_unflags = 
; build_src_flags = 
;     -I$PROJECT_DIR/lib/halmettask

; Do these need to be defined?
; GWIIC_SDA, GWIIC_SCL

    ${env.build_flags}
