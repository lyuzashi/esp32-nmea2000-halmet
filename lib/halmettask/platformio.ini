[platformio]

# Include task configurations that extend halmet
; extra_configs = 
; 	lib/halmet*/platformio.ini
    ; lib/halmetPluginNavlinkBLETask/platformio.ini

; build_cache_dir= ./.pio/build_cache/halmet

default_envs = halmet

; Shared filter definitions
[halmet_filters]
; Libraries to ignore (prevents compilation of their code)
; We provide stub headers in halmettask/stubs so includes still work
libs_ignore = 
    iictask
    spitask
    nmea2kto0183
    nmea0183ton2k
    xdrmappings
    boatData
    ESPmDNS

; Config categories to filter out (removes from web UI and reduces config size)
; Patterns: exact match or prefix (e.g., "xdr" matches xdr1, xdr2, etc.)
categories = 
    iicsensors1
    iicsensors2
    spisensors1
    spisensors2
    xdr
    converter

; Constants to preserve even when their category is filtered
; (main.cpp references these directly)
preserve_constants = 
    talkerId
    sendN2k

[halmet_base]
lib_deps = 
    ${basedeps.lib_deps}
    ; These newer libs actually help make /api/config stable!
    esp32async/AsyncTCP @ ^3.4.10
	esp32async/ESPAsyncWebServer @ ^3.9.6
    ; BLE - extract to own task
    h2zero/NimBLE-Arduino@2.3.3 ; Specific older version without heap issues
    ${Am2320task.lib_deps}

[env:halmet]
board = esp32dev

lib_deps = 
    ${halmet_base.lib_deps}

lib_ignore = 
    ; ttlappalainen_NMEA2000  ; No longer needed - we override instead of ignore
    ; FastLED
    ; ledtask
    ; buttontask
    ESPAsyncTCP-esphome
    AsyncTCP-esphome
    ESPAsyncWebServer-esphome
    ; Incompatible async libs pulled in by transitive deps
    RPAsyncTCP
    ESPAsyncTCP
    ; Filtered tasks - use libs_ignore (includes iictask which we replace)
    ${halmet_filters.libs_ignore}

custom_config=
    lib/halmettask/halmetConfig.json

build_flags=
    -D BOARD_HALMET
    -D NAVLINK_BLE_ENABLED
    -D _GWIIC
    -D AM2320_ENABLED
    -D GWIIC_SDA=21
    -D GWIIC_SCL=22
    -fpermissive
    -I lib/halmettask/stubs ; Include stubs directory
    ${env.build_flags}

; Feature stripping options - NOW ALL HANDLED BY STUBS
; custom_strip_mdns = true     ; Handled by ESPmDNS.h stub
; custom_strip_xdr = true      ; Handled by xdrmappings stub
; custom_strip_nmea0183 = true ; Handled by nmea2kto0183/nmea0183ton2k stubs

; Use shared filter definitions
custom_filter_categories = ${halmet_filters.categories}
custom_preserve_constants = ${halmet_filters.preserve_constants}

extra_scripts = 
    ${env.extra_scripts}
    pre:lib/halmettask/filter_config.py
    ; pre:lib/halmettask/extra_script_halmet.py
    ; pre:lib/halmettask/strip_features.py

