[platformio]

# Include task configurations for Halmet extensions
extra_configs = 
	lib/halmet*/platformio.ini

build_cache_dir= ./.pio/build_cache/halmet

default_envs = halmet

[env:halmet]
board = esp32dev

lib_deps = 
    ${basedeps.lib_deps}
    ; These newer libs actually help make /api/config stable!
    esp32async/AsyncTCP @ ^3.4.10
    esp32async/ESPAsyncWebServer @ ^3.11.0
    ; Halmet extension libs
    ${Bme280task.lib_deps}
    ${navlinkble.lib_deps}
    ${vedirecttask.lib_deps}
    ${onewiretask.lib_deps}
    ${ADCtask.lib_deps}

lib_ignore =
    ; Replaced with new versions above
    AsyncTCP-esphome
    ESPAsyncWebServer-esphome
    ; Incompatible async libs pulled in by transitive deps
    RPAsyncTCP
    ESPAsyncTCP
    ; Filtered tasks replaced with stubs
    iictask
    spitask
    nmea2kto0183
    nmea0183ton2k
    xdrmappings
    boatData
    ESPmDNS
    ; Use optimized channel implementation (lazy receiver allocation)
    channel

extra_scripts = 
    ; Download ESM deps from Skypack (cached in lib/generated/)
    pre:lib/halmettask/bundle_esm_deps.py
    ${env.extra_scripts}
    ; Fix C++ compatibility issues with new Async libraries
    pre:lib/halmettask/cxx_flags.py
    ; Filter unused 0183 config and regenerate headers
    pre:lib/halmettask/filter_config.py
    ; Patch dynamic allocations in src/main.cpp to prevent heap fragmentation
    ; pre:lib/halmettask/patch_main_allocs.py

; Embedded ESM bundles for offline dashboard (built by bundle_esm_deps.py)
board_build.embed_files = 
    ${env.board_build.embed_files}
    lib/generated/halmet_preact.js.gz
    lib/generated/halmet_canboat_part_01.js.gz
    lib/generated/halmet_canboat_part_02.js.gz
    lib/generated/halmet_canboat_part_03.js.gz
    lib/generated/halmet_canboat_part_04.js.gz
    lib/generated/halmet_canboat_part_05.js.gz
    lib/generated/halmet_canboat_part_06.js.gz
    lib/generated/halmet_canboat_part_07.js.gz
    lib/generated/halmet_canboat_part_08.js.gz

; Dashboard JS files must be in order: libraries -> core -> components -> init
custom_js=lib/halmettask/web/halmet-libraries.js,lib/halmettask/web/halmet-dashboard-core.js,lib/halmettask/web/halmet-dashboard-components.js,lib/halmettask/web/halmet-dashboard-init.js,lib/halmettask/web/halmet-switch-panel.js,lib/halmettask/web/halmet.js
custom_css=lib/halmettask/web/halmet.css,lib/halmettask/web/halmet-dashboard.css,lib/halmettask/web/halmet-switch-panel.css

build_flags=
    -D BOARD_HALMET
    -D NAVLINK_BLE_ENABLED
    -D ONEWIRE_ENABLED
    -D BME280_ENABLED
    -D VEDIRECT_ENABLED
    -D DIGITAL_SWITCHING_ENABLED
    -D WS_STREAM_ENABLED
    -D ADC_TANK_ENABLED
    -D MESSAGE_CALLBACKS_ENABLED
    -D TIME_SYNC_ENABLED
    -D HALMET_SENSOR_ENABLED
    -D HALMET_TASK_ENABLED
    -D HALMET_IIC_ENABLED
    -D HALMET_RESTART_COUNTER_ENABLED
    -D HALMET_NMEA_CALLBACK_ENABLED
    -D HALMET_USE_CUSTOM_CHANNEL
    ; Stable profile: keep callback dispatch/message/time/digital-switch handlers enabled.
    -D HALMET_CHANNEL_NO_COUNTERS ; Disable per-PGN message counters (saves ~160+ bytes/channel)
    ; This possibly causes TCP heap exhaustion
    ; -D HALMET_CHANNEL_NO_NMEA0183 ; Remove NMEA0183 parsing entirely (saves ~700+ bytes)
    ; Define Halmet I2C pins
    -D GWIIC_SDA=21
    -D GWIIC_SCL=22
    -I lib/halmettask/stubs ; Include stubs directory
    -I lib/halmettask/channel ; Include optimized channel implementation
    -I lib/halmettask/hardware.h ; Include hardware def
    ${env.build_flags}
    ; Include build flags from Halmet extension tasks
    ${navlinkble.build_flags}
    ${onewiretask.build_flags}

; Config categories to filter out (removes from web UI and reduces config size)
; Patterns: exact match or prefix (e.g., "xdr" matches xdr1, xdr2, etc.)
custom_filter_categories = 
    iicsensors1
    iicsensors2
    spisensors1
    spisensors2
    xdr
    converter

; Constants to preserve even when their category is filtered
; (main.cpp references these directly)
custom_preserve_constants =
    talkerId
    sendN2k
