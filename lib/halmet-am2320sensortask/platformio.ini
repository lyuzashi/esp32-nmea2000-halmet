; AM2320 Sensor Task Configuration
; This adds AM2320 library dependencies to the halmet environment
; PlatformIO automatically merges [env:halmet] sections from extra_configs

[am2320sensortask]
lib_deps = 
    ${env:halmet.lib_deps}
    adafruit/Adafruit AM2320 sensor library @ ^1.2.5
    adafruit/Adafruit BusIO @ ^1.17.4

; This file is automatically included via halmettask/platformio.ini extra_configs
; The lib_deps above will be merged into the main env:halmet definition
