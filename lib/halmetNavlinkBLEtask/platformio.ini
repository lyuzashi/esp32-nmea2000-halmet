; NavLink BLE Task Configuration
[navlinkble]

lib_deps = 
    h2zero/NimBLE-Arduino@^2.3.7

custom_config=
    lib/halmetNavlinkBLEtask/config.json

build_flags=
    ; BLE optimisations
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
    -DCONFIG_BT_NIMBLE_MAX_BONDS=1
    -DCONFIG_BT_NIMBLE_ROLE_CENTRAL_DISABLED=1
    -DCONFIG_BT_NIMBLE_ROLE_OBSERVER_DISABLED=1
    -DCONFIG_NIMBLE_CPP_ATT_VALUE_INIT_LENGTH=20
    -DCONFIG_BT_NIMBLE_ATT_PREFERRED_MTU=64