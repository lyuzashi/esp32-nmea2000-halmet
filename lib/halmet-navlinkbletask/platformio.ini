[halmet-navlinkbletask]
; NavLink BLE Task Configuration

lib_deps = 
    ${env:halmet.lib_deps}
    ; Add any additional libraries needed for NavLink BLE functionality here
    h2zero/NimBLE-Arduino@^2.3.7


build_flags=
    ; === BLUETOOTH CLASSIC DISABLED (saves ~30KB) ===
    -D CONFIG_BT_CLASSIC_ENABLED=0
    -D CONFIG_BT_A2DP_ENABLE=0
    -D CONFIG_BT_SPP_ENABLED=0
    
    ; === NimBLE OPTIMIZATIONS (BLE only) ===
    -D CONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
    -D CONFIG_BT_NIMBLE_MAX_SERVICES=1
    -D CONFIG_BT_NIMBLE_MAX_CHARACTERISTICS=1
    -D CONFIG_BT_NIMBLE_SVC_GAP_DEVICE_NAME_MAX_LEN=20
    -D CONFIG_BT_NIMBLE_ATT_PREFERRED_MTU=128
    -D CONFIG_BT_NIMBLE_ROLE_BROADCASTER=1
    -D CONFIG_BT_NIMBLE_ROLE_PERIPHERAL=1
    -D CONFIG_BT_NIMBLE_ROLE_CENTRAL=0
    -D CONFIG_BT_NIMBLE_ROLE_OBSERVER=0
    
    ; === WIFI OPTIMIZATIONS (reduce buffers) ===
    ; -D CONFIG_ESP32_WIFI_STATIC_RX_BUFFER_NUM=4
    ; -D CONFIG_ESP32_WIFI_DYNAMIC_RX_BUFFER_NUM=8
    ; -D CONFIG_ESP32_WIFI_DYNAMIC_TX_BUFFER_NUM=8
    ; -D CONFIG_ESP32_WIFI_AMPDU_TX_ENABLED=0
    ; -D CONFIG_ESP32_WIFI_AMPDU_RX_ENABLED=0
    ; -D CONFIG_ESP32_WIFI_CACHE_TX_BUFFER_NUM=8
    
    ; === WIFI/BLE COEXISTENCE ===
    -D CONFIG_ESP32_WIFI_SW_COEXIST_ENABLE=1
    ; -D CONFIG_ESP32_WIFI_NVS_ENABLED=0
    
    ; === LWIP OPTIMIZATIONS (reduce TCP/IP stack) ===
    -D CONFIG_LWIP_MAX_SOCKETS=4
    -D CONFIG_LWIP_TCP_SND_BUF_DEFAULT=2920
    -D CONFIG_LWIP_TCP_WND_DEFAULT=2920
    -D CONFIG_LWIP_TCP_RECVMBOX_SIZE=4
    -D CONFIG_LWIP_UDP_RECVMBOX_SIZE=4
    
    ; === GENERAL OPTIMIZATIONS ===
    ; -D CONFIG_FREERTOS_UNICORE=1
    ; -D CONFIG_ARDUINO_LOOP_STACK_SIZE=3072
    ; -D CORE_DEBUG_LEVEL=0
    
    ${env:halmet.build_flags}
