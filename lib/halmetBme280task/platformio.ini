; BME280 Sensor Task Configuration
; This adds BME280 library dependencies to the halmet environment

[Bme280task]

lib_deps = 
    Wire
    SPI
    adafruit/Adafruit BME280 Library @ ^2.2.4
    adafruit/Adafruit BusIO @ ^1.17.4
    adafruit/Adafruit Unified Sensor @ ^1.1.15

; This file is automatically included via halmettask/platformio.ini extra_configs
; The lib_deps above will be merged into the main env:halmet definition
